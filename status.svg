<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      /* Chameleon Theming Engine */
      :root {
        --bg-glass: rgba(0, 0, 0, 0.02);
        --border-glass: rgba(0, 0, 0, 0.15);
        --header-bg: rgba(0, 0, 0, 0.06);
        --text-main: rgba(0, 0, 0, 0.85);
        --text-muted: rgba(0, 0, 0, 0.5);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-glass: rgba(255, 255, 255, 0.03);
          --border-glass: rgba(255, 255, 255, 0.12);
          --header-bg: rgba(255, 255, 255, 0.08);
          --text-main: rgba(255, 255, 255, 0.9);
          --text-muted: rgba(255, 255, 255, 0.5);
        }
      }

      /* Global Styles */
      .window-pane {
        fill: var(--bg-glass);
        stroke: var(--border-glass);
        stroke-width: 1.5px;
        rx: 10px; /* Rounded corners */
      }
      .window-header {
        fill: var(--header-bg);
      }
      
      /* Typography Stack - Uses native system monospace for GitHub compatibility */
      text {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, 'Courier New', monospace;
      }
      .title-text {
        font-size: 13px;
        fill: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .body-text {
        font-size: 14px;
        fill: var(--text-main);
      }
    </style>

    <g id="window-controls">
      <circle cx="15" cy="15" r="6" fill="#ff5f56" />
      <circle cx="35" cy="15" r="6" fill="#ffbd2e" />
      <circle cx="55" cy="15" r="6" fill="#27c93f" />
    </g>
  </defs>

  <g id="window1-identity" transform="translate(20, 20)">
    <rect class="window-pane" width="960" height="120" />
    <path class="window-header" d="M10 0 h940 a10 10 0 0 1 10 10 v20 h-960 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="480" y="20" class="title-text" text-anchor="middle">root@mahdavi:~</text>
    
    <g id="inject-identity" transform="translate(25, 65)">
      
    <text x="10" y="0" class="body-text" font-weight="bold" fill="#81A1C1">root@wahid:~$<tspan dx="10" fill="#ECEFF4">./whoami --full-profile</tspan></text>
    
    <g transform="translate(10, 25)">
        <text y="0" class="body-text">
            <tspan fill="#4C566A">NAME_ </tspan>
            <tspan fill="#ECEFF4" font-weight="bold">Wahid Alawy</tspan>
        </text>
        <text y="22" class="body-text">
            <tspan fill="#4C566A">ROLE_ </tspan>
            <tspan fill="#B48EAD">Network &amp; Software Engineer</tspan>
        </text>
    </g>

    <g transform="translate(400, 25)">
        <text y="0" class="body-text">
            <tspan fill="#4C566A">LOC_  </tspan>
            <tspan fill="#ECEFF4">Qom, Iran</tspan>
        </text>
        <text y="22" class="body-text">
            <tspan fill="#4C566A">STAT_ </tspan>
            <tspan fill="#A3BE8C">[ OK ] Root Access Granted</tspan>
        </text>
    </g>
    
    </g>
  </g>

  <g id="window2-infra" transform="translate(20, 160)">
    <rect class="window-pane" width="300" height="470" />
    <path class="window-header" d="M10 0 h280 a10 10 0 0 1 10 10 v20 h-300 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="150" y="20" class="title-text" text-anchor="middle">sys_infra.sh</text>
    
    <g id="inject-infra" transform="translate(20, 60)">
      
    <text x="10" y="0" class="body-text" fill="#81A1C1" font-weight="bold">[+] HYPERVISORS &amp; OPS</text>
    
    <text x="10" y="25" class="body-text" fill="#4C566A">├── <tspan fill="#D8DEE9">VMware ESXi</tspan></text>
    <text x="10" y="50" class="body-text" fill="#4C566A">├── <tspan fill="#D8DEE9">ProLiant DL380/DL360 Gen9</tspan></text>
    <text x="10" y="75" class="body-text" fill="#4C566A">├── <tspan fill="#D8DEE9">Docker Containers</tspan></text>
    <text x="10" y="100" class="body-text" fill="#4C566A">└── <tspan fill="#D8DEE9">Ubuntu 24.04 LTS</tspan></text>

    <text x="10" y="145" class="body-text" fill="#81A1C1" font-weight="bold">[+] LANGUAGES &amp; STACK</text>
    
    <text x="10" y="170" class="body-text" fill="#4C566A">├── <tspan fill="#EBCB8B">[Low-Level]</tspan> <tspan fill="#D8DEE9">C / C++ / Rust</tspan></text>
    <text x="10" y="195" class="body-text" fill="#4C566A">├── <tspan fill="#A3BE8C">[Backend]  </tspan> <tspan fill="#D8DEE9">Python / PHP</tspan></text>
    <text x="10" y="220" class="body-text" fill="#4C566A">└── <tspan fill="#B48EAD">[Frontend] </tspan> <tspan fill="#D8DEE9">React / Next.js</tspan></text>
    
    <rect x="0" y="360" width="260" height="30" rx="4" fill="rgba(163, 190, 140, 0.1)" stroke="#A3BE8C" stroke-width="1"/>
    <text x="130" y="380" class="body-text" fill="#A3BE8C" font-size="12px" text-anchor="middle">● All Infrastructure Operational</text>
    
    </g>
  </g>

