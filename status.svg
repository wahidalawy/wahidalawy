<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      /* Chameleon Theming Engine */
      :root {
        --bg-glass: rgba(0, 0, 0, 0.02);
        --border-glass: rgba(0, 0, 0, 0.15);
        --header-bg: rgba(0, 0, 0, 0.06);
        --text-main: rgba(0, 0, 0, 0.85);
        --text-muted: rgba(0, 0, 0, 0.5);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-glass: rgba(255, 255, 255, 0.03);
          --border-glass: rgba(255, 255, 255, 0.12);
          --header-bg: rgba(255, 255, 255, 0.08);
          --text-main: rgba(255, 255, 255, 0.9);
          --text-muted: rgba(255, 255, 255, 0.5);
        }
      }

      /* Global Styles */
      .window-pane {
        fill: var(--bg-glass);
        stroke: var(--border-glass);
        stroke-width: 1.5px;
        rx: 10px; /* Rounded corners */
      }
      .window-header {
        fill: var(--header-bg);
      }
      
      /* Typography Stack - Uses native system monospace for GitHub compatibility */
      text {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, 'Courier New', monospace;
      }
      .title-text {
        font-size: 13px;
        fill: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .body-text {
        font-size: 14px;
        fill: var(--text-main);
      }
    </style>

    <g id="window-controls">
      <circle cx="15" cy="15" r="6" fill="#ff5f56" />
      <circle cx="35" cy="15" r="6" fill="#ffbd2e" />
      <circle cx="55" cy="15" r="6" fill="#27c93f" />
    </g>
  </defs>

  <g id="window1-identity" transform="translate(20, 20)">
    <rect class="window-pane" width="960" height="120" />
    <path class="window-header" d="M10 0 h940 a10 10 0 0 1 10 10 v20 h-960 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="480" y="20" class="title-text" text-anchor="middle">root@mahdavi:~</text>
    
    <g id="inject-identity" transform="translate(25, 65)">
      </g>
  </g>

  <g id="window2-infra" transform="translate(20, 160)">
    <rect class="window-pane" width="300" height="470" />
    <path class="window-header" d="M10 0 h280 a10 10 0 0 1 10 10 v20 h-300 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="150" y="20" class="title-text" text-anchor="middle">sys_infra.sh</text>
    
    <g id="inject-infra" transform="translate(20, 60)">
      </g>
  </g>

  <g id="window3-processes" transform="translate(340, 160)">
    <rect class="window-pane" width="320" height="470" />
    <path class="window-header" d="M10 0 h300 a10 10 0 0 1 10 10 v20 h-320 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="160" y="20" class="title-text" text-anchor="middle">htop -u root</text>
    
    <g id="inject-processes" transform="translate(20, 60)">
      </g>
  </g>

  <g id="window4-stats" transform="translate(680, 160)">
    <rect class="window-pane" width="300" height="225" />
    <path class="window-header" d="M10 0 h280 a10 10 0 0 1 10 10 v20 h-300 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="150" y="20" class="title-text" text-anchor="middle">metrics_daemon</text>
    
    <g id="inject-stats" transform="translate(20, 60)">
      </g>
  </g>

  <g id="window5-protocols" transform="translate(680, 405)">
    <rect class="window-pane" width="300" height="225" />
    <path class="window-header" d="M10 0 h280 a10 10 0 0 1 10 10 v20 h-300 v-20 a10 10 0 0 1 10 -10 z" />
    <use href="#window-controls" />
    <text x="150" y="20" class="title-text" text-anchor="middle">netstat -tuln</text>
    
    <g id="inject-protocols" transform="translate(20, 60)">
      </g>
  </g>

</svg>
