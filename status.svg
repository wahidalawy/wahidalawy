    <g transform="translate(5, 75)">
        <path d="M 0,35.0 L 5,35.0 L 10,32.6 L 15,30.0 L 20,28.7 L 25,29.1 L 30,29.7 L 35,28.7 L 40,25.3 L 45,20.2 L 50,15.4 L 55,12.5 L 60,11.8 L 65,12.3 L 70,12.0 L 75,10.1 L 80,6.9 L 85,5.0 L 90,5.0 L 95,6.3 L 100,10.1 L 105,13.5 L 110,15.1 L 115,15.2 L 120,15.4 L 125,17.3 L 130,21.3 L 135,26.4 L 140,30.5 L 145,32.3 L 150,31.8 L 155,30.5 L 160,30.2 L 165,31.5 L 170,33.7 L 175,34.7 L 180,33.3 L 185,29.5 L 190,24.9 L 195,21.2 L 200,19.7 L 205,19.5 L 210,19.0 L 215,16.7 L 220,12.6 L 225,8.2 L 230,5.3 L 235,5.1 L 240,6.9 L 245,9.2 L 250,10.2" fill="none" stroke="#B48EAD" stroke-width="2" style="filter: drop-shadow(0px 0px 4px rgba(180, 142, 173, 0.5));"/>
