        <tspan x="40" fill="#81A1C1">root</tspan>
        <tspan x="80" fill="#A3BE8C">08.1</tspan>
        <tspan x="125" fill="#ECEFF4">python bs4_scraper.py</tspan>
    </text>
    
    <text y="120" class="body-text">
