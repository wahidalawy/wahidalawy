        <tspan x="40" fill="#81A1C1">root</tspan>
        <tspan x="80" fill="#A3BE8C">02.4</tspan>
        <tspan x="125" fill="#ECEFF4">win_handle_io.exe</tspan>
    </text>

    <text y="150" class="body-text">
        <tspan x="5" fill="#B48EAD">9014</tspan>
        <tspan x="40" fill="#81A1C1">root</tspan>
        <tspan x="80" fill="#A3BE8C">32.8</tspan>
        <tspan x="125" fill="#ECEFF4">note_watcher_pipeline</tspan>
    </text>

    <path d="M 5 185 L 265 185" stroke="#4C566A" stroke-width="1" stroke-dasharray="4 4"/>
    
    <text x="5" y="210" class="body-text" fill="#EBCB8B" font-size="12px">
        [SYS] DB Control Plane: PostgreSQL
    </text>
    
    </g>
  </g>

